<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografía Deportiva | Hache Uve</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Enlazamos tu CSS global para mantener el header y footer idénticos -->
    <link rel="stylesheet" href="style.css">

    <style>
        /* Estilos específicos para la página de la galería */
        .gallery-page {
            padding-top: 140px;
            padding-bottom: 80px;
            min-height: 80vh;
        }

        .gallery-intro {
            text-align: center;
            margin-bottom: 50px;
        }

        .gallery-intro p {
            font-size: 1.1rem;
            max-width: 600px;
            margin: 20px auto 0;
            opacity: 0.9;
            line-height: 1.6;
        }

        /* DISEÑO DE COLUMNAS ESTILO PINTEREST (Respeta tamaños originales) */
        .gallery-grid {
            column-count: 3; /* Número de columnas en pantallas grandes */
            column-gap: 20px; /* Espacio horizontal entre columnas */
            padding: 0 20px;
        }

        .gallery-item {
            break-inside: avoid; /* Evita que una imagen se parta entre dos columnas */
            margin-bottom: 20px; /* Espacio vertical entre las imágenes */
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            background-color: rgba(0,0,0,0.05);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
        }

        .gallery-item img {
            width: 100%;
            height: auto; /* Permite que la altura sea proporcional a la original */
            display: block;
            transition: transform 0.6s ease;
        }

        /* Efecto premium al pasar el ratón por encima */
        .gallery-item:hover {
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .gallery-item:hover img {
            transform: scale(1.04);
        }

        /* Estado de carga por si tarda un pelín */
        .gallery-loading {
            text-align: center;
            font-size: 1.2rem;
            padding: 50px;
            font-weight: 500;
            letter-spacing: 1px;
            color: #ffffff;
        }

        /* Adaptación a tablets y móviles */
        @media (max-width: 992px) {
            .gallery-grid { column-count: 2; } /* 2 columnas en pantallas medianas */
        }

        @media (max-width: 768px) {
            .gallery-page { padding-top: 110px; }
            .gallery-grid { column-count: 1; gap: 15px; } /* 1 sola columna en móviles */
        }
    </style>
</head>
<body>

    <!-- Tu menú dinámico se inyectará aquí -->
    <div id="header-placeholder"></div>

    <main class="gallery-page">
        <div class="container-gallery">
            
            <div class="gallery-intro">
                <h2>Fotografía Deportiva</h2>
                <p>Capturando la intensidad, el esfuerzo y la pasión en cada milésima de segundo. Echa un vistazo a mis últimos disparos en el campo.</p>
            </div>

            <!-- Contenedor donde el script verterá las imágenes de forma automática -->
            <div id="sport-gallery" class="gallery-grid">
                <div class="gallery-loading">Cargando disparos...</div>
            </div>

        </div>
    </main>

    <!-- Tu footer dinámico se inyectará aquí -->
    <div id="footer-placeholder"></div>

<!-- SCRIPT UNIFICADO: Componentes, Escáner de Carpeta y Efecto Scroll -->
    <script>
        // Ruta de la carpeta de archivos (Recuerda cambiarla por './disenos/' o './urbana/' en sus respectivas páginas)
        const dir = "./deportiva/"; 

        async function scanAndBuildGallery() {
            // Busca el contenedor de la galería (Se adapta a 'sport-gallery', 'designs-gallery' o 'urban-gallery' de forma automática)
            const galleryContainer = document.getElementById("sport-gallery") || 
                                     document.getElementById("designs-gallery") || 
                                     document.getElementById("urban-gallery");
            
            if (!galleryContainer) return;
            
            try {
                // 1. Solicitamos el índice de la carpeta al servidor local
                const response = await fetch(dir);
                if (!response.ok) throw new Error("No se pudo acceder a la carpeta");
                
                const htmlText = await response.text();
                
                // 2. Analizamos el contenido devuelto
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, "text/html");
                const links = doc.querySelectorAll("a");
                
                // Limpiamos el mensaje de "Cargando..."
                galleryContainer.innerHTML = "";
                let imageCount = 0;

                // 3. Filtramos los archivos de imagen
                links.forEach(link => {
                    const href = link.getAttribute("href");
                    
                    if (href && href.match(/\.(jpe?g|png|webp|avif)$/i)) {
                        imageCount++;
                        
                        // 4. Creamos la estructura respetando el flujo original
                        const item = document.createElement("div");
                        item.className = "gallery-item";
                        
                        item.innerHTML = `<img src="${dir}${href}" alt="Portfolio - Hache Uve" loading="lazy">`;
                        
                        galleryContainer.appendChild(item);
                    }
                });

                if (imageCount === 0) {
                    galleryContainer.innerHTML = `<div class='gallery-loading'>¡Pronto verás archivos por aquí! Añade imágenes a la carpeta ${dir}</div>`;
                }

            } catch (error) {
                console.error("Error cargando los archivos automáticamente:", error);
                galleryContainer.innerHTML = "<div class='gallery-loading'>Asegúrate de estar ejecutando la web en tu servidor local (Live Server) para que se puedan escanear los archivos.</div>";
            }
        }

        // Sistema asíncrono de carga de componentes (Header y Footer)
        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error('Error al procesar el módulo');
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
            } catch (error) {
                console.error(`Error cargando el archivo ${file}:`, error);
            }
        }

        // Ejecutamos todo de forma coordinada cuando los componentes estén listos
        Promise.all([
            loadComponent('header-placeholder', 'header.html'),
            loadComponent('footer-placeholder', 'footer.html')
        ]).then(() => {
            
            // 1. Lanzamos el escáner para pintar tus fotos/diseños
            scanAndBuildGallery();

            // 2. Activamos el fondo oscuro del Header al hacer scroll hacia abajo
            const header = document.querySelector('header');
            if (header) {
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 50) {
                        header.classList.add('header-scrolled');
                    } else {
                        header.classList.remove('header-scrolled');
                    }
                });
            }
        });
    </script>
</body>
</html>
