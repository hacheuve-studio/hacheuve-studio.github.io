<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografía Deportiva | Hache Uve</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .gallery-item {
            width: 100%;
            aspect-ratio: 4/5; /* Formato vertical/retrato ideal para fotos */
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .gallery-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        /* Diseño del Lightbox (Visor de imagen a pantalla completa) */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #lightbox.active {
            display: flex;
            opacity: 1;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: var(--primary-orange);
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>
    
    <main style="padding-top: 150px; min-height: 70vh;">
        <div class="container">
            <h2>Fotografía Deportiva</h2>
            
            <div class="services-intro">
                <p>Capturando la acción, la tensión y la gloria en cada milésima de segundo. Haz clic en las imágenes para verlas a pantalla completa.</p>
            </div>

            <div class="gallery-grid" id="gallery-container"></div>

        </div>
    </main>

    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="" alt="Imagen ampliada">
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // ==========================================
        // 1. CONFIGURA AQUÍ TUS FOTOGRAFÍAS
        // ==========================================
        // Nombre de la carpeta donde están las fotos
        const carpetaFotos = "fotografia/"; 
        
        // Escribe aquí el nombre exacto de cada archivo de foto que tengas en esa carpeta
        const listaDeFotos = [
            "foto1.jpg",
            "foto2.jpg",
            "foto3.jpg",
            // Añade más aquí separadas por comas, por ejemplo:
            // "partido-final.png",
            // "retrato-jugador.jpg"
        ];

        // ==========================================
        // 2. LÓGICA DE LA GALERÍA
        // ==========================================
        const container = document.getElementById('gallery-container');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        // Generar las imágenes en la cuadrícula
        listaDeFotos.forEach(nombreFoto => {
            const rutaCompleta = carpetaFotos + nombreFoto;
            
            const imgElement = document.createElement('img');
            imgElement.src = rutaCompleta;
            imgElement.alt = "Fotografía Deportiva";
            imgElement.classList.add('gallery-item');
            
            // Al hacer clic, se abre en el visor
            imgElement.onclick = () => openLightbox(rutaCompleta);
            
            container.appendChild(imgElement);
        });

        // Funciones para abrir y cerrar el visor (Lightbox)
        function openLightbox(ruta) {
            lightboxImg.src = ruta;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            // Retrasar el vaciado de la imagen para que la transición sea suave
            setTimeout(() => { lightboxImg.src = ""; }, 300); 
        }

        // Cerrar el visor si se hace clic fuera de la imagen
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // ==========================================
        // 3. CARGA MODULAR DE HEADER Y FOOTER
        // ==========================================
        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error('Error al cargar');
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
            } catch (error) {
                console.error(`Error cargando ${file}:`, error);
            }
        }

        Promise.all([
            loadComponent('header-placeholder', 'header.html'),
            loadComponent('footer-placeholder', 'footer.html')
        ]).then(() => {
            const header = document.getElementById('main-header');
            if (header) {
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 50) {
                        header.classList.add('header-scrolled');
                    } else {
                        header.classList.remove('header-scrolled');
                    }
                });
            }
        });
    </script>
</body>
</html>
